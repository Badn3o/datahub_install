services:
datahub-mysql-setup:
  image: acryldata/datahub-mysql-setup:v0.12.1
  container_name: datahub-mysql-setup
  networks:
    - datahub_network
  environment:
    MYSQL_HOST: "mysql"
    MYSQL_PORT: "3306"
    MYSQL_USERNAME: "root"
    MYSQL_PASSWORD: "root_password"
    MYSQL_DATABASE: "datahub"
    MYSQL_USER: "datahub"
    MYSQL_PASS: "datahub_password"
  depends_on:
    mysql:
      condition: service_healthy
datahub-setup:
  image: acryldata/datahub-upgrade:v0.12.1
  container_name: datahub-setup
  networks:
    - datahub_network
  command: ["-u", "SystemUpdate"]
  environment:
    EBEAN_DATASOURCE_HOST: "mysql:3306"
    EBEAN_DATASOURCE_USERNAME: "datahub"
    EBEAN_DATASOURCE_PASSWORD: "datahub_password"
    EBEAN_DATASOURCE_URL: "jdbc:mysql://mysql:3306/datahub?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=yes&characterEncoding=UTF-8"
    # (Opcional) si quieres ser explícito con el driver moderno:
    # EBEAN_DATASOURCE_DRIVER: "com.mysql.cj.jdbc.Driver"
    ENTITY_REGISTRY_CONFIG_PATH: "/datahub/datahub-gms/resources/entity-registry.yml"   
  depends_on:
    mysql:
      condition: service_healthy

  datahub-gms:
    image: linkedin/datahub-gms:v0.12.1
    container_name: datahub-gms
    networks:
      - datahub_network
    command: ["/bin/sh", "/datahub/datahub-gms/scripts/start.sh"]
    environment:
      # Yo NO desactivaría los checks mientras estés validando conectividad:
      # si algo falla, prefieres que lo diga claro.
      SKIP_ELASTICSEARCH_CHECK: "false"
      SKIP_MYSQL_CHECK: "false"
      SKIP_NEO4J_CHECK: "false"
      SKIP_KAFKA_CHECK: "false"

      # Infra
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      ELASTICSEARCH_HOST: "elasticsearch"
      ELASTICSEARCH_PORT: "9200"
      environment:
      GRAPH_SERVICE_IMPL: "neo4j"
      NEO4J_HOST: "http://neo4j:7474"
      NEO4J_URI: "bolt://neo4j"   # (el quickstart lo deja así; opcionalmente bolt://neo4j:7687)
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "datahub"
      NEO4J_PORT: "7474"
      KAFKA_BOOTSTRAP_SERVER: "kafka:9092"

      # App
      DATAHUB_GMS_PORT: "8080"
      MYSQL_DATABASE: "datahub"
      MYSQL_USERNAME: "datahub"
      MYSQL_PASSWORD: "datahub_password"
      GRAPH_SERVICE_IMPL: "neo4j"
      NEO4J_URI: "bolt://neo4j:7687"
      ENTITY_REGISTRY_CONFIG_PATH: "/datahub/datahub-gms/resources/entity-registry.yml" 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy

  datahub-frontend-react:
    image: linkedin/datahub-frontend-react:v0.12.1
    container_name: datahub-frontend
    networks:
      - datahub_network
    ports:
      - "80:9002"
    depends_on:
      datahub-gms:
        condition: service_started
    environment:
      DATAHUB_GMS_HOST: "datahub-gms"
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_GMS_PROTOCOL: "http"

      DATAHUB_SECRET: "una_cadena_muy_larga_y_secreta_de_32_caracteres"
      KAFKA_BOOTSTRAP_SERVER: "kafka:9092"
      METADATA_SERVICE_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9002/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  datahub_network:
    external: true





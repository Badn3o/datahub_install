services:
  # DataHub Actions (opcional pero recomendado)
  datahub-actions:
    build:
      context: .
    image: acryldata/datahub-actions:snowflake-head
    container_name: datahub-actions
    hostname: datahub-actions
    depends_on:
      - datahub-gms
      - kafka
      - schema-registry
    environment:
      DATAHUB_GMS_HOST: datahub-gms
      DATAHUB_GMS_PORT: 8080
      DATAHUB_GMS_PROTOCOL: http

      # Pon ambas para evitar que coja defaults raros
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_BOOTSTRAP_SERVER: kafka:9092

      SCHEMA_REGISTRY_URL: http://schema-registry:8081

      GMS_HOST: datahub-gms
      GMS_PORT: 8080
    networks:
      - datahub_network
    restart: unless-stopped

  datahub-gms:
    image: linkedin/datahub-gms:v0.12.1
    container_name: datahub-gms
    networks:
      - datahub_network
    command: ["/bin/bash", "/datahub/datahub-gms/scripts/start.sh"]

    environment:
      # ==============================
      # MySQL / Ebean (FORMA CORRECTA EN ESTA IMAGEN)
      # ==============================
      # OJO: aquí debe ir host:puerto
      EBEAN_DATASOURCE_HOST: "mysql:3306"
      EBEAN_DATASOURCE_USERNAME: "datahub"
      EBEAN_DATASOURCE_PASSWORD: "datahub_password"
      # (Opcional pero recomendable) fuerza también la URL completa
      EBEAN_DATASOURCE_URL: "jdbc:mysql://mysql:3306/datahub?useSSL=false&allowPublicKeyRetrieval=true"

      # (Opcional) si quieres mantener también el override por -D, no estorba
      JAVA_OPTS: >-
              -Ddatasource.gmsEbeanServiceConfig.url=jdbc:mysql://mysql:3306/datahub?useSSL=false&allowPublicKeyRetrieval=true
        -Ddatasource.gmsEbeanServiceConfig.username=datahub
        -Ddatasource.gmsEbeanServiceConfig.password=datahub_password

      # ==============================
      # Infra
      # ==============================
      ELASTICSEARCH_HOST: "elasticsearch"
      ELASTICSEARCH_PORT: "9200"
      KAFKA_BOOTSTRAP_SERVER: "kafka:9092"

      # ==============================
      # Neo4j
      # ==============================
      GRAPH_SERVICE_IMPL: "neo4j"
      # start.sh añade http:// si no hay esquema, así que aquí SIN esquema y CON puerto:
      NEO4J_HOST: "neo4j:7474"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "neo4j"
      NEO4J_PASSWORD: "datahub"

      # ==============================
      # App
      # ==============================
      METADATA_SERVICE_AUTH_ENABLED: "false"
      ENTITY_REGISTRY_CONFIG_PATH: "/datahub/datahub-gms/resources/entity-registry.yml"

      SKIP_ELASTICSEARCH_CHECK: "false"
      SKIP_KAFKA_CHECK: "false"
      SKIP_NEO4J_CHECK: "false"
      # Nota: el script usa SKIP_EBEAN_CHECK (no SKIP_MYSQL_CHECK) para el wait de MySQL
      SKIP_EBEAN_CHECK: "false"
      # Schema Registry (NO localhost dentro del contenedor)
      KAFKA_SCHEMAREGISTRY_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      SCHEMA_REGISTRY: "http://schema-registry:8081"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 15

    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
              condition: service_healthy
      neo4j:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  datahub-frontend-react:
    image: linkedin/datahub-frontend-react:v0.12.1
    container_name: datahub-frontend
    networks:
      - datahub_network
    ports:
      - "80:9002"
    depends_on:
      datahub-gms:
        condition: service_started
    environment:
      DATAHUB_GMS_HOST: "datahub-gms"
      DATAHUB_GMS_PORT: "8080"
      DATAHUB_GMS_PROTOCOL: "http"
      DATAHUB_SECRET: "una_cadena_muy_larga_y_secreta_de_32_caracteres"
      KAFKA_BOOTSTRAP_SERVER: "kafka:9092"
      METADATA_SERVICE_AUTH_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9002/healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  datahub_network:
    external: true
